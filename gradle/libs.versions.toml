[versions]
kotlin = "2.0.0"
gradleApp = "8.3.2"
androidxCore = "1.15.0"
lifecycle = "2.8.7"
activityCompose = "1.10.0"
lifecycleViewModelCompose = "2.8.7"
composeBom = "2025.02.00"
firebaseBom = "33.9.0"
datastore = "1.1.2"
koin = "4.0.2"
accompanist = "0.37.0"
navigationCompose = "2.8.7"
junit = "4.13.2"
androidxJunit = "1.2.1"
espresso = "3.6.1"
timber = "5.0.1"

[plugins]
androidApplication = { id = "com.android.application", version.ref = "gradleApp" }
googleServices = { id = "com.google.gms.google-services", version = "4.4.2" }
firebasePerf = { id = "com.google.firebase.firebase-perf", version = "1.4.2" }
firebaseCrashlytics = { id = "com.google.firebase.crashlytics", version = "3.0.3" }
kotlinAndroid = { id = "org.jetbrains.kotlin.android", version.ref = "kotlin" }
kotlinCompose = { id = "org.jetbrains.kotlin.plugin.compose", version.ref = "kotlin" }

[libraries]
timber = { module = "com.jakewharton.timber:timber", version.ref = "timber" }

androidxCore = { module = "androidx.core:core-ktx", version.ref = "androidxCore" }
lifecycleRuntime = { module = "androidx.lifecycle:lifecycle-runtime-ktx", version.ref = "lifecycle" }
activityCompose = { module = "androidx.activity:activity-compose", version.ref = "activityCompose" }
lifecycleViewModelCompose = { module = "androidx.lifecycle:lifecycle-viewmodel-compose", version.ref = "lifecycleViewModelCompose" }

composeBom = { module = "androidx.compose:compose-bom", version.ref = "composeBom" }
composeUi = { module = "androidx.compose.ui:ui" }
composeUiUtil = { module = "androidx.compose.ui:ui-util" }
composeUiGraphics = { module = "androidx.compose.ui:ui-graphics" }
composeToolingPreview = { module = "androidx.compose.ui:ui-tooling-preview" }
material3 = { module = "androidx.compose.material3:material3" }
materialIconsExtended = { module = "androidx.compose.material:material-icons-extended" }

firebaseBom = { module = "com.google.firebase:firebase-bom", version.ref = "firebaseBom" }
firebaseAnalytics = { module = "com.google.firebase:firebase-analytics" }
firebaseCrashlytics = { module = "com.google.firebase:firebase-crashlytics" }
firebasePerf = { module = "com.google.firebase:firebase-perf" }

datastore = { module = "androidx.datastore:datastore-preferences", version.ref = "datastore" }

koinAndroid = { module = "io.insert-koin:koin-android", version.ref = "koin" }
koinAndroidCompose = { module = "io.insert-koin:koin-androidx-compose", version.ref = "koin" }
accompanistPermissions = { module = "com.google.accompanist:accompanist-permissions", version.ref = "accompanist" }

navigationCompose = { module = "androidx.navigation:navigation-compose", version.ref = "navigationCompose" }

junit = { module = "junit:junit", version.ref = "junit" }
androidxJunit = { module = "androidx.test.ext:junit", version.ref = "androidxJunit" }
espresso = { module = "androidx.test.espresso:espresso-core", version.ref = "espresso" }
composeUiTestJunit4 = { module = "androidx.compose.ui:ui-test-junit4" }
composeTooling = { module = "androidx.compose.ui:ui-tooling" }
composeTestManifest = { module = "androidx.compose.ui:ui-test-manifest" }